name: CI

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "AGENTS.md"
      - "LICENSE"
      - "notes.txt"
      - "*.md"
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wxPython system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libsdl2-dev libnotify-dev freeglut3-dev

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync --all-extras --dev

      - run: uv run ruff check

      - run: uv run ty check src/aiowx/

      - run: uv run pytest --cov=src --cov-report=xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
